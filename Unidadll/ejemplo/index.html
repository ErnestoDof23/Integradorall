<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Viewport responsivo -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Imágenes con enlaces - Tortas, Tacos y Gringas</title>
  <meta name="description" content="Página de ejemplo con imágenes de torta, taco y gringa enlazadas a Google.">
  <meta name="keywords" content="tortas, tacos, gringas, comida, enlaces, imágenes">
  <meta name="author" content="Near">

  <!-- Accesibilidad -->
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <header>
    <nav>
      <h1>Imágenes con enlaces</h1>
      <ul>
        <li><a href="#torta">Torta</a></li>
        <li><a href="#taco">Taco</a></li>
        <li><a href="#gringa">Gringa</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Galería de enlaces</h2>

      <article>
        <h3>Links</h3>

        <!-- Imagen de torta -->
        <a id="torta" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
          <img src="img/tortas.jpeg" alt="Imagen de una torta mexicana" width="200">
        </a>

        <!-- Imagen de taco -->
        <a id="taco" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
          <img src="img/taco.jpeg" alt="Imagen de un taco" width="200">
        </a>

        <!-- Imagen de gringa -->
        <a id="gringa" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
          <img src="img/gi.jpeg" alt="Imagen de una gringa mexicana" width="200">
        </a>

      </article>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Near. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
