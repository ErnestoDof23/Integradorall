# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campusReserve
spring.datasource.username=root
spring.datasource.password=rootroot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=WARN
logging.level.com.integradora=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.root=INFO
logging.level.com.integradora.campusreserve=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Application Configuration
app.jwtSecret=campus_reserve_jwt_secret_key_2024_very_secure_integradora_proyecto
app.jwtExpirationMs=86400000

# CORS Configuration
app.corsAllowedOrigins=http://localhost:5174,http://localhost:3000
